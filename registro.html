<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear cuenta — Lectora de Estrellas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body { background: var(--cream); min-height: 100vh; display: flex; flex-direction: column; }
    .auth-wrap { flex:1; display:flex; align-items:center; justify-content:center; padding:3rem 1.5rem; background:linear-gradient(135deg,#f5ede0 0%,#ede0f0 50%,#f5ede0 100%); }
    .auth-card { background:white; border-radius:var(--radius-lg); padding:2.75rem 2.5rem; max-width:440px; width:100%; box-shadow:0 8px 40px rgba(107,68,113,0.12); border:1px solid rgba(155,122,158,0.1); }
    .auth-header { text-align:center; margin-bottom:2rem; }
    .auth-logo { font-family:var(--font-display); font-size:0.78rem; letter-spacing:0.2em; color:var(--plum); margin-bottom:0.5rem; }
    .auth-logo em { font-family:var(--font-body); font-style:italic; letter-spacing:0; color:var(--mauve); }
    .auth-symbol { font-size:1.75rem; color:var(--gold); margin-bottom:0.75rem; display:block; }
    .auth-title { font-size:1.75rem; margin-bottom:0.3rem; color:var(--ink); }
    .auth-subtitle { font-size:0.92rem; color:var(--ink-soft); line-height:1.55; }
    .auth-form { display:flex; flex-direction:column; gap:1rem; margin-top:1.75rem; }
    .form-field { display:flex; flex-direction:column; gap:0.35rem; min-width:0; }
    .form-label { font-family:var(--font-ui); font-size:0.75rem; font-weight:500; color:var(--ink-soft); }
    .form-input { padding:0.75rem 1rem; border:1.5px solid rgba(155,122,158,0.25); border-radius:var(--radius-sm); font-family:var(--font-ui); font-size:0.92rem; color:var(--ink); background:var(--cream); outline:none; transition:border-color 0.2s,background 0.2s; box-sizing:border-box; width:100%; }
    .form-input:focus { border-color:var(--plum); background:white; }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:0.75rem; }
    .auth-btn { width:100%; padding:0.9rem; background:var(--plum); color:white; border:none; border-radius:var(--radius-full); font-family:var(--font-ui); font-size:0.85rem; font-weight:500; letter-spacing:0.08em; text-transform:uppercase; cursor:pointer; transition:all 0.25s; margin-top:0.5rem; display:flex; align-items:center; justify-content:center; gap:0.5rem; }
    .auth-btn:hover { background:var(--deep-plum); transform:translateY(-1px); box-shadow:0 6px 20px rgba(107,68,113,0.3); }
    .auth-btn:disabled { opacity:0.6; cursor:not-allowed; transform:none; }
    .auth-divider { display:flex; align-items:center; gap:1rem; margin:1rem 0; font-family:var(--font-ui); font-size:0.75rem; color:var(--ink-soft); }
    .auth-divider::before, .auth-divider::after { content:''; flex:1; height:1px; background:rgba(155,122,158,0.2); }
    .auth-link-row { text-align:center; font-family:var(--font-ui); font-size:0.82rem; color:var(--ink-soft); margin-top:1rem; }
    .auth-link-row a { color:var(--plum); font-weight:500; text-decoration:none; }
    .auth-link-row a:hover { text-decoration:underline; }
    .auth-message { padding:0.75rem 1rem; border-radius:var(--radius-sm); font-family:var(--font-ui); font-size:0.82rem; display:none; margin-top:0.5rem; line-height:1.5; }
    .auth-message.error { background:rgba(201,125,110,0.1); border:1px solid rgba(201,125,110,0.3); color:var(--rose); display:block; }
    .auth-message.success { background:rgba(45,122,79,0.1); border:1px solid rgba(45,122,79,0.3); color:#2d7a4f; display:block; }
    .auth-nav { background:var(--midnight); padding:1rem 2rem; display:flex; align-items:center; justify-content:center; }
    .auth-nav a { font-family:var(--font-display); font-size:0.78rem; letter-spacing:0.2em; color:var(--parchment); text-decoration:none; }
    .auth-nav a em { font-family:var(--font-body); font-style:italic; letter-spacing:0; color:var(--mauve); }
    .password-hint { font-family:var(--font-ui); font-size:0.72rem; color:var(--mauve); margin-top:0.25rem; }
    @media(max-width:480px){ .form-row{grid-template-columns:1fr;} }
  </style>
</head>
<body>

<nav class="auth-nav">
  <a href="index.html">LECTORA <em>de</em> ESTRELLAS</a>
</nav>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-header">
      <span class="auth-symbol">✦</span>
      <div class="auth-logo">LECTORA <em>de</em> ESTRELLAS</div>
      <h1 class="auth-title">Crear cuenta</h1>
      <p class="auth-subtitle">Crea tu cuenta para acceder a tus cursos y masterclasses.</p>
    </div>

    <form class="auth-form" onsubmit="handleRegister(event)">
      <div class="form-row">
        <div class="form-field">
          <label class="form-label" for="nombre">Nombre *</label>
          <input class="form-input" type="text" id="nombre" placeholder="Tu nombre" required autocomplete="given-name">
        </div>
        <div class="form-field">
          <label class="form-label" for="apellido">Apellido *</label>
          <input class="form-input" type="text" id="apellido" placeholder="Tu apellido" required autocomplete="family-name">
        </div>
      </div>

      <div class="form-field">
        <label class="form-label" for="email">Correo electrónico *</label>
        <input class="form-input" type="email" id="email" placeholder="tu@email.com" required autocomplete="email">
      </div>

      <div class="form-field">
        <label class="form-label" for="password">Contraseña *</label>
        <input class="form-input" type="password" id="password" placeholder="Mínimo 8 caracteres" required autocomplete="new-password" minlength="8">
        <span class="password-hint">Mínimo 8 caracteres</span>
      </div>

      <div class="form-field">
        <label class="form-label" for="password2">Confirmar contraseña *</label>
        <input class="form-input" type="password" id="password2" placeholder="Repite tu contraseña" required autocomplete="new-password">
      </div>

      <div class="auth-message" id="auth-message"></div>

      <button class="auth-btn" type="submit" id="register-btn">
        Crear mi cuenta ✦
      </button>
    </form>

    <div class="auth-divider">o</div>

    <div class="auth-link-row">
      ¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a>
    </div>
    <div class="auth-link-row" style="margin-top:0.5rem">
      <a href="index.html" style="color:var(--mauve)">← Volver al inicio</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://bvohupycpzbmkqyzgjup.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ2b2h1cHljcHpibWtxeXpnanVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4NDI3NjgsImV4cCI6MjA5NjQxODc2OH0.umbGX48cmi0Gob62dpipDH9YN7n74dFI0rVNnuCrFV4';
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  supabaseClient.auth.getSession().then(({ data: { session } }) => {
    if (session) window.location.href = 'mi-cuenta.html';
  });

  async function handleRegister(e) {
    e.preventDefault();
    const nombre   = document.getElementById('nombre').value.trim();
    const apellido = document.getElementById('apellido').value.trim();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const password2= document.getElementById('password2').value;
    const btn = document.getElementById('register-btn');
    const msg = document.getElementById('auth-message');

    msg.className = 'auth-message';

    if (password !== password2) {
      msg.textContent = 'Las contraseñas no coinciden.';
      msg.className = 'auth-message error';
      return;
    }

    if (password.length < 8) {
      msg.textContent = 'La contraseña debe tener mínimo 8 caracteres.';
      msg.className = 'auth-message error';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Creando cuenta...';

    const { data, error } = await supabaseClient.auth.signUp({
      email,
      password,
      options: {
        data: { nombre, apellido, full_name: `${nombre} ${apellido}` }
      }
    });

    if (error) {
      msg.textContent = error.message.includes('already registered')
        ? 'Este email ya tiene una cuenta. ¿Quieres iniciar sesión?'
        : error.message;
      msg.className = 'auth-message error';
      btn.disabled = false;
      btn.textContent = 'Crear mi cuenta ✦';
      return;
    }

    msg.textContent = '✓ Cuenta creada. Revisa tu email para confirmar tu cuenta y luego inicia sesión.';
    msg.className = 'auth-message success';
    btn.textContent = '✓ Cuenta creada';
  }
</script>
</body>
</html>
