[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[build.environment]
  NODE_VERSION = "18"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/tienda"
  to = "/tienda.html"
  status = 200

[[redirects]]
  from = "/sesiones"
  to = "/sesiones.html"
  status = 200

[[redirects]]
  from = "/blog"
  to = "/blog.html"
  status = 200

[[redirects]]
  from = "/eventos"
  to = "/eventos.html"
  status = 200

# ── Language detection: redirect English-preferring visitors to /en/ ──────────
# Netlify reads Accept-Language header and matches the primary language.
# Only the 3 high-impact pages have English versions.

[[redirects]]
  from = "/"
  to = "/en/"
  status = 302
  conditions = {Language = ["en"]}

[[redirects]]
  from = "/index.html"
  to = "/en/index.html"
  status = 302
  conditions = {Language = ["en"]}

[[redirects]]
  from = "/sesiones.html"
  to = "/en/sesiones.html"
  status = 302
  conditions = {Language = ["en"]}

[[redirects]]
  from = "/carta-astral.html"
  to = "/en/carta-astral.html"
  status = 302
  conditions = {Language = ["en"]}
